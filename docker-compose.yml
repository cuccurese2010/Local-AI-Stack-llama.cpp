# ============================================================
#  AI Stack Locale — Open WebUI + Kokoro TTS + SearXNG + SD
#  Backend: llama.cpp (esterno su porta 8080)
#  Image Gen: Stable Diffusion (Automatic1111 su porta 7860)
# ============================================================

networks:
  ai-net:
    driver: bridge

volumes:
  openwebui-data:
  searxng-data:

services:

  # ----------------------------------------------------------
  # NGINX — SSL Termination Proxy
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - open-webui

  # ----------------------------------------------------------
  # KOKORO TTS — High-quality TTS on GPU
  # ----------------------------------------------------------
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: kokoro-tts
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8880:8880"
    environment:
      - TZ=America/Chicago
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ----------------------------------------------------------
  # SEARXNG
  # ----------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081

  # ----------------------------------------------------------
  # OPEN WEBUI — Configurato con LLM, Ricerca, TTS e Image Gen
  # ----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    networks:
      - ai-net
    volumes:
      - openwebui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_BASE_URL=http://host.docker.internal:8080/v1
      - OPENAI_API_KEY=sk-no-key-required

      # Web Search configuration
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      
      # Audio via Kokoro
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://kokoro-tts:8880/v1
      - AUDIO_TTS_MODEL=kokoro
      - AUDIO_TTS_VOICE=af_bella

      # IMAGE GENERATION (Stable Diffusion / Automatic1111)
      - ENABLE_IMAGE_GEN=True
      - IMAGE_GEN_ENGINE=openai
      - IMAGE_GEN_OPENAI_API_BASE_URL=http://host.docker.internal:7860/sdapi/v1
      - IMAGE_GEN_OPENAI_API_KEY=sk-no-key-required
      - IMAGE_GEN_MODEL=juggernautXL_v9.safetensors
      - IMAGE_SIZE=1024x1024
      - IMAGE_STEPS=35
      # Nota: Usiamo l'engine 'openai' perché Open WebUI inoltra correttamente le chiamate API
      # Se preferisci il selettore specifico per Automatic1111:
      - ENABLE_IMAGE_GEN_STEPS=true
      - IMAGE_GEN_MODEL=juggernautXL_v9.safetensors
      - IMAGE_SIZE=1024x1024
      - IMAGE_STEPS=50

    depends_on:
      - kokoro-tts
      - searxng
